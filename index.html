<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Wrap Champion</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body>

<div class="milestone-bar" id="milestoneBanner"></div>

<div class="game-layout">

  <!-- Control Panel -->
  <div class="control-panel">

  <header>
    <div class="title-box raised">
      <h1>&gt;&gt; BUBBLE WRAP CHAMPION &lt;&lt;</h1>
    </div>
    <div class="subtitle">OXYGEN AWAITS<span class="blink">_</span></div>
  </header>

  <!-- Resources Panel -->
  <div class="resources-panel raised">
    <div class="win-titlebar" id="resourcesTitlebar">
      <span class="win-title">RESOURCES</span>
    </div>
    <div class="panel-body" id="panelBody">

      <div id="resourceStats"></div>

    </div>
  </div>

  </div><!-- /.control-panel -->

  <!-- Game Area -->
  <div class="game-area">

    <!-- Popping Area -->
    <div class="popping-area">
      <div class="table-wrapper">
        <div class="game-table" id="gameTable">
          <div class="bubble-sheet raised" id="bubbleSheet">
            <div class="bubble-grid" id="bubbleGrid"></div>
          </div>
          <div class="empty-table" id="emptyTable">
            <div class="done-title">ALL BUBBLES<br>POPPED!</div>
            <div class="done-hint">&gt; GRAB NEW SHEET &lt;</div>
          </div>
        </div>
      </div><!-- /.table-wrapper -->
    </div>

    <!-- Actions Area -->
    <div class="actions-area">

      <!-- Progress Bar -->
      <div class="prog-wrap">
        <div class="prog-labels">
          <span>&gt; SHEET PROGRESS</span>
          <span id="progText">0%</span>
        </div>
        <div class="prog-track sunken">
          <div class="prog-fill" id="progFill" style="width:0%"></div>
        </div>
      </div>

      <!-- Stack Buttons -->
      <div class="btn-area">
        <button class="stack-btn" id="stackBtn" disabled>[ GRAB NEW SHEET ]</button>
        <button class="stack-btn" id="storeBtn" disabled>[ RUN TO STORE ]</button>
        <div class="btn-hint" id="btnHint">POP ALL BUBBLES FIRST</div>
      </div>

    </div>

  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
